<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22></text></svg>">
</head>
<body>
    <div class="snow-container">
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
        <div class="snow"></div>
    </div>

    <div class="fog"></div>

    <div class="container">

        <div class="card">
            <div class="profile">
                <div class="profile-img-container">
                    <img id="che" src="che12.png" alt="" class="profile-img">
                    <div class="frost-overlay"></div>
                </div>
                <h1 class="username">
                    <span class="name-text">zen</span>
                </h1>
                <p class="bio">
                    <span class="typing-text">wassup</span>
                    <span class="cursor-blink">_</span>
                </p>
            </div>

            <div class="social-links">
                <a href="#" class="social-link github-link" data-tooltip="GitHub">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                    <div class="frost-effect"></div>
                </a>

                <a href="#" class="social-link email-link" data-tooltip="Email">
                    <i class="fas fa-envelope"></i>
                    <span>Contact</span>
                    <div class="frost-effect"></div>
                </a>
            </div>

            <div class="footer">
                <p>© 2026 - @zensobased</p>
                <div class="last-seen">
                    <i class="fas fa-clock"></i>
                    <span id="last-seen">Last seen: calculating...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="discord-rich-presence">
        <div class="discord-card">
            <div class="discord-header">
                <i class="fab fa-discord"></i>
                <span>Discord Status</span>
            </div>
            <div class="discord-user-info">
                <div class="discord-avatar-container">
                    <img src="https://cdn.discordapp.com/avatars/123456789/abcdef123456.png" alt="Discord Avatar" class="discord-avatar-img">
                    <div class="discord-status-indicator online"></div>
                </div>
                <div class="discord-user-details">
                    <h4 class="discord-username">zen</h4>
                    <p class="discord-status-text">Listening to Spotify</p>
                </div>
            </div>
            <div class="discord-activity">
                <div class="spotify-activity">
                    <div class="spotify-album-art">
                        <img src="https://i.scdn.co/image/ab67616d0000b2731d11f6a209d5db90b4f68e6f" alt="Spotify Album Art" class="spotify-album-img">
                    </div>
                    <div class="spotify-track-info">
                        <div class="spotify-track-name">Waiting</div>
                        <div class="spotify-artist-name">Leverfall</div>
                        <div class="spotify-progress-bar">
                            <div class="spotify-progress-fill"></div>
                        </div>
                        <div class="spotify-timestamps">
                            <span class="spotify-current-time">0:00</span>
                            <span class="spotify-separator">•</span>
                            <span class="spotify-total-time">3:45</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="music-player">
        <div class="music-card">
            <div class="music-header">
                <i class="fas fa-music"></i>
                <span>Now Playing</span>
            </div>
            <div class="music-info">
                <div class="album-art-container">
                    <img src="https://i.scdn.co/image/ab67616d0000b2731d11f6a209d5db90b4f68e6f" alt="Album Art" class="album-art">
                    <div class="music-frost-overlay"></div>
                </div>
                <div class="track-details">
                    <h3 class="track-title">Waiting</h3>
                    <p class="artist-name">Leverfall</p>
                </div>
            </div>
            <div class="music-controls">
                <button class="control-btn prev-btn" id="prev-btn">
                    <i class="fas fa-backward"></i>
                </button>
                <button class="control-btn play-pause-btn" id="play-pause-btn">
                    <i class="fas fa-play"></i>
                </button>
                <button class="control-btn next-btn" id="next-btn">
                    <i class="fas fa-forward"></i>
                </button>
            </div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="total-time">3:45</span>
                </div>
            </div>
            <div class="volume-control">
                <i class="fas fa-volume-up"></i>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="70">
            </div>
        </div>
    </div>

    <div class="cursor"></div>

    <script src="script.js"></script>
</body>
</html>
